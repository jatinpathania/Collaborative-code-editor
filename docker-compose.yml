version: "3.9"

services:
  app:
    build: .
    container_name: code-editor-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/code_editor
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NODE_ENV: production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: code-editor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_editor
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    restart: unless-stopped

  python-runner:
    image: python:3.11-alpine
    container_name: python-runner
    command: tail -f /dev/null
    networks:
      - app-network

  node-runner:
    image: node:18-alpine
    container_name: node-runner
    command: tail -f /dev/null
    networks:
      - app-network

  java-runner:
    image: eclipse-temurin:17-jdk-alpine
    container_name: java-runner
    command: tail -f /dev/null
    networks:
      - app-network

  cpp-runner:
    image: gcc:latest
    container_name: cpp-runner
    command: tail -f /dev/null
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge